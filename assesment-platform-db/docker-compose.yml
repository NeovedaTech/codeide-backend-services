version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: assessment-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  redis:
    image: redis:latest
    container_name: assessment-redis
    ports:
      - "6380:6379"
    command: >
      redis-server 
      --requirepass strongredispass
      --maxmemory 256mb
      --appendonly yes
      --save 900 1
      --save 300 10
      --save 60 10000
    restart: always

volumes:
  mongo-data:
